name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobsdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d jobsdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobsdb
      JWT_SECRET: supersecretkey

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4   # ✅ FIXED

      - uses: actions/setup-node@v4
        with:
          node-version: 22           # ✅ UPDATED
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: pnpm test
